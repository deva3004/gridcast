version: 2

seeds:
  - name: us_federal_holidays
    description: >
      US federal holiday calendar (2019-2027), used by the marts layer to
      derive the is_holiday feature. Regenerated by a one-off Python script,
      not hand-maintained.
    config:
      column_types:
        holiday_date: date
        holiday_name: varchar(64)
    columns:
      - name: holiday_date
        tests: [not_null, unique]
      - name: holiday_name
        tests: [not_null]
