name: "gridcast"
version: "1.0.0"
config-version: 2

profile: "gridcast"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Materialization strategy per layer:
#   staging       -> views  (cheap, always-fresh 1:1 cleanups over raw)
#   intermediate  -> views  (joins/reshaping, not queried directly)
#   marts         -> tables (feature tables the model + API read repeatedly)
models:
  gridcast:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
