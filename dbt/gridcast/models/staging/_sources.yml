version: 2

# `source()` declares the raw tables dbt reads FROM (loaded by COPY INTO).
# Referencing them via {{ source('eia', 'region_data') }} — rather than a
# hardcoded table name — is what lets dbt build lineage and lets you swap the
# physical location without touching model SQL.
sources:
  - name: eia
    database: GRIDCAST
    schema: STAGING
    tables:
      - name: region_data
        identifier: RAW_EIA_DATA
        description: >
          Raw EIA API responses, one full JSON response object per row in the
          `payload` VARIANT column (one row per region/type/ingest_date file
          COPY INTO landed). Flattening `payload:response:data` into one row
          per hourly reading happens in the stg_eia__region_data model.
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 72, period: hour}
        columns:
          - name: payload
            tests: [not_null]
          - name: source_file
            tests: [not_null]
