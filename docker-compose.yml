# D9 — full-stack local deployment. Skeleton: fill image/build details per
# service as you containerize. Airflow (slim, LocalExecutor) can be added here
# or run from the standard Airflow compose; keep Redis/Celery OUT.

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    ports: ["5000:5000"]
    volumes: ["mlflow_data:/mlflow"]

  api:
    build: { context: ., dockerfile: docker/api.Dockerfile }   # TODO(D9)
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: [.env]
    ports: ["8000:8000"]
    depends_on: [mlflow]

  dashboard:
    build: { context: ., dockerfile: docker/dashboard.Dockerfile }  # TODO(D9)
    command: streamlit run src/dashboard/app.py --server.address 0.0.0.0
    environment:
      GRIDCAST_API_URL: "http://api:8000"
    ports: ["8501:8501"]
    depends_on: [api]

volumes:
  mlflow_data:
